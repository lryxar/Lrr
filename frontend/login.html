<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lrrhub | تسجيل/دخول</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="header">
    <div class="container nav">
      <div class="brand"><span class="brand-badge">LR</span> lrrhub</div>
      <nav class="nav-links">
        <a href="/index.html">الرئيسية</a>
        <a href="/dashboard.html">اللوحة</a>
      </nav>
    </div>
  </header>

  <main class="container" style="margin-top:26px;">
    <section class="grid">
      <article class="card">
        <div class="card-body">
          <h2 style="margin:0 0 8px">تسجيل / دخول</h2>
          <p class="muted">بوابتك إلى lrrhub لإدارة بوتات Discord.</p>

          <div class="stack">
            <div>
              <label for="username">اسم المستخدم</label>
              <input id="username" placeholder="username" />
            </div>
            <div>
              <label for="password">كلمة المرور</label>
              <input id="password" type="password" placeholder="••••••••" />
            </div>
          </div>

          <div class="actions">
            <button class="btn" onclick="auth('/auth/register')">تسجيل جديد</button>
            <button class="btn ghost" onclick="auth('/auth/login')">تسجيل دخول</button>
          </div>
        </div>
      </article>

      <article class="panel">
        <h3 style="margin-top:6px">نتيجة العملية</h3>
        <pre id="output" class="console">{ "info": "جاهز لاستقبال الطلبات" }</pre>
        <div class="actions">
          <button class="btn light" onclick="goDashboard()">الانتقال للوحة التحكم</button>
        </div>
      </article>
    </section>

    <div class="footer">© lrrhub — جميع الحقوق محفوظة لـ l19r</div>
  </main>

  <script>
    async function auth(path) {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const output = document.getElementById('output');

      if (!username || !password) {
        output.textContent = JSON.stringify({ error: 'أدخل اسم المستخدم وكلمة المرور' }, null, 2);
        return;
      }

      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      output.textContent = JSON.stringify(data, null, 2);

      if (data.user_id) {
        localStorage.setItem('owner_id', data.user_id);
      }
    }

    function goDashboard() {
      window.location.href = '/dashboard.html';
    }
  </script>
</body>
</html>
