<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lryxar</title>
  <link rel="stylesheet" href="/public/style.css" />
</head>
<body>
  <div class="container">
    <h1>lryxar</h1>
    <p>Nitro Generator & Checker</p>

    <div class="panel">
      <label>Count <input id="count" type="number" value="20" min="1" max="500" /></label>
      <button id="generate">Generate</button>
      <button id="scan">Scan</button>
      <button id="stop">Stop</button>
    </div>

    <div class="panel">
      <input id="code" placeholder="single code" />
      <button id="check">Check One</button>
    </div>

    <pre id="log"></pre>
  </div>
  <script src="/public/app.js"></script>
</body>
</html>
